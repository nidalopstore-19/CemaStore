<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toko Tama Premium | Digital Store</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root {
            --primary: #f5b041;
            --bg-dark: #0b0d0f;
            --card-bg: #161a1e;
            --border: #242a32;
            --text-gray: #8e959e;
            --success: #10b981;
            --danger: #ef4444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg-dark); color: #ffffff; padding: 20px; max-width: 500px; margin: auto; }

        .toast { position: fixed; top: -100px; left: 50%; transform: translateX(-50%); background: var(--danger); color: white; padding: 12px 25px; border-radius: 12px; font-size: 13px; font-weight: bold; z-index: 10000; transition: 0.5s; }
        .toast.show { top: 30px; }
        .toast.success { background: var(--success); }

        .header { text-align: center; margin: 30px 0; }
        .profile-img { width: 80px; height: 80px; border-radius: 50%; border: 2px solid var(--primary); margin-bottom: 10px; }

        .stats-container { display: grid; grid-template-columns: repeat(3, 1fr); background: var(--card-bg); padding: 15px; border-radius: 15px; margin-bottom: 20px; border: 1px solid var(--border); }
        .stat-box { text-align: center; }
        .stat-val { font-size: 18px; font-weight: bold; color: var(--primary); }
        .stat-label { font-size: 10px; color: var(--text-gray); text-transform: uppercase; }

        .btn-cek-nav { background: var(--card-bg); border: 1px solid var(--border); color: var(--primary); padding: 14px; border-radius: 15px; width: 100%; margin-bottom: 20px; font-weight: bold; cursor: pointer; }

        .card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 20px; padding: 20px; margin-bottom: 12px; position: relative; cursor: pointer; }
        .price { color: var(--primary); font-size: 18px; font-weight: 800; }
        .stock-tag { position: absolute; top: 15px; right: 15px; font-size: 10px; padding: 2px 8px; border-radius: 10px; }
        .tag-red { background: rgba(239, 68, 68, 0.1); color: var(--danger); }
        .tag-green { background: rgba(16, 185, 129, 0.1); color: var(--success); }

        .modal { display: none; position: fixed; z-index: 9999; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(8px); }
        .modal-content { position: fixed; bottom: 0; width: 100%; background: var(--card-bg); padding: 30px; border-radius: 30px 30px 0 0; max-width: 500px; left: 50%; transform: translateX(-50%); }

        .sheet-input { width: 100%; background: var(--bg-dark); border: 2px solid var(--border); padding: 15px; color: white; border-radius: 12px; margin-bottom: 15px; outline: none; }
        .btn-buy { background: #4f46e5; color: white; border: none; padding: 16px; width: 100%; border-radius: 15px; font-weight: bold; cursor: pointer; }

        .qris-box { background: white; border-radius: 15px; padding: 15px; margin: 15px auto; width: fit-content; min-height: 200px; }
        .amount-highlight { background: var(--bg-dark); border: 2px dashed var(--primary); padding: 15px; border-radius: 12px; margin: 15px 0; text-align: center; }
        .amount-highlight strong { color: var(--primary); font-size: 22px; }

        .spinner { width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.8s linear infinite; display: inline-block; margin-right: 8px; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="errorToast" class="toast"></div>

<div class="header">
    <img src="https://via.placeholder.com/150" class="profile-img">
    <h1 class="store-name">TAMA PREMIUM</h1>
</div>

<div class="stats-container">
    <div class="stat-box"><div class="stat-val" id="totalProd">0</div><div class="stat-label">Total</div></div>
    <div class="stat-box"><div class="stat-val" id="totalStok">0</div><div class="stat-label">Ready</div></div>
    <div class="stat-box"><div class="stat-val" id="totalTersedia">0</div><div class="stat-label">Produk</div></div>
</div>

<button class="btn-cek-nav" onclick="openInvoiceModal()">🔍 CEK INVOICE / AMBIL AKUN</button>
<div id="productList"></div>

<div id="paymentModal" class="modal">
    <div class="modal-content">
        <div id="step-input">
            <h2 id="payTitle">Detail Order</h2>
            <br>
            <input type="text" id="buyerName" class="sheet-input" placeholder="Nama Lengkap">
            <input type="email" id="buyerEmail" class="sheet-input" placeholder="Email Aktif">
            <div id="payPrice" style="text-align:center; font-size:20px; font-weight:bold; color:var(--primary); margin-bottom:20px;"></div>
            <button class="btn-buy" id="btnLanjutkan" onclick="tampilkanQRIS()">Beli Sekarang</button>
        </div>

        <div id="step-qris" style="display:none; text-align:center;">
            <h3>Scan QRIS</h3>
            <div class="qris-box" id="qrisCanvas"></div>
            <div class="amount-highlight">
                <small style="color:var(--text-gray)">Total Bayar:</small><br>
                <strong id="totalAmountDisplay">Rp 0</strong>
            </div>
            <button class="btn-buy" disabled style="background:#242a32;"><span class="spinner"></span>MENUNGGU BAYAR...</button>
        </div>

        <div id="step-success" style="display:none; text-align:center;">
            <h2>✅ Berhasil!</h2>
            <div id="finalData" style="background:black; padding:15px; border-radius:10px; margin:15px 0; color:var(--primary); font-family:monospace;"></div>
            <button class="btn-buy" onclick="location.reload()">KEMBALI</button>
        </div>

        <button id="btnClose" onclick="closeModal()" style="background:none; border:none; color:var(--danger); width:100%; margin-top:20px; cursor:pointer;">BATALKAN</button>
    </div>
</div>

<div id="invoiceModal" class="modal">
    <div class="modal-content" style="bottom:50%; transform:translate(-50%, 50%)">
        <h2>Cek Invoice</h2>
        <input type="text" id="inputTrxId" class="sheet-input" placeholder="ID Transaksi">
        <button class="btn-buy" onclick="cariInvoice()">CARI</button>
        <div id="invoiceResult"></div>
        <button onclick="closeInvoiceModal()" style="background:none; border:none; color:white; width:100%; margin-top:15px;">TUTUP</button>
    </div>
</div>

<script>
    // GANTI INI DENGAN URL VERCEL KAMU!
    const VERCEL_URL = "https://proyek-kamu.vercel.app"; 
    const BASE_URL = "https://toko-tama-default-rtdb.asia-southeast1.firebasedatabase.app/";
    const CASHIFY_QRIS_ID = "8aa46a5a-ac64-44b4-b20d-2d1e1bbe1ec1";

    let produkCache = {};
    let selectedProdId, selectedAkunId, selectedDataAkun, hargaFix, cashifyTransactionId, pollingInterval;

    function showToast(msg, type = "error") {
        const t = document.getElementById('errorToast');
        t.innerText = msg;
        t.className = "toast " + (type === "success" ? "success" : "") + " show";
        setTimeout(() => t.classList.remove('show'), 3000);
    }

    async function fetchProducts() {
        try {
            const [resP, resS] = await Promise.all([fetch(`${BASE_URL}produk.json`), fetch(`${BASE_URL}stok_akun.json`)]);
            const dataP = await resP.json();
            const dataS = await resS.json() || {};
            const container = document.getElementById('productList');
            container.innerHTML = "";
            
            Object.keys(dataP).forEach(id => {
                const stok = dataS[id] ? Object.keys(dataS[id]).length : 0;
                produkCache[id] = { nama: dataP[id].nama, harga: dataP[id].harga, stok: dataS[id] || {} };
                
                const card = document.createElement('div');
                card.className = "card";
                card.innerHTML = `
                    <div class="stock-tag ${stok > 0 ? 'tag-green' : 'tag-red'}">${stok > 0 ? stok + ' Ready' : 'Habis'}</div>
                    <div class="card-title">${dataP[id].nama}</div>
                    <div class="price">Rp ${parseInt(dataP[id].harga).toLocaleString()}</div>
                `;
                card.onclick = () => stok > 0 ? openPayment(id) : showToast("Stok Habis");
                container.appendChild(card);
            });
        } catch (e) { showToast("Gagal muat produk"); }
    }

    function openPayment(id) {
        selectedProdId = id;
        const p = produkCache[id];
        selectedAkunId = Object.keys(p.stok)[0];
        selectedDataAkun = p.stok[selectedAkunId];
        hargaFix = parseInt(p.harga);
        document.getElementById('payTitle').innerText = p.nama;
        document.getElementById('payPrice').innerText = "Total: Rp " + hargaFix.toLocaleString();
        document.getElementById('paymentModal').style.display = "block";
    }

    async function tampilkanQRIS() {
        const btn = document.getElementById('btnLanjutkan');
        btn.disabled = true;
        btn.innerHTML = "<span class='spinner'></span>Proses...";

        try {
            const res = await fetch(`${VERCEL_URL}/api/generate`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ id: CASHIFY_QRIS_ID, amount: hargaFix, useUniqueCode: true })
            });
            const result = await res.json();
            if (!result.data) throw new Error(result.error || "Gagal");

            cashifyTransactionId = result.data.transactionId;
            document.getElementById('qrisCanvas').innerHTML = "";
            new QRCode(document.getElementById('qrisCanvas'), { text: result.data.qr_string, width: 200, height: 200 });
            document.getElementById('totalAmountDisplay').innerText = "Rp " + result.data.totalAmount.toLocaleString();
            document.getElementById('step-input').style.display = "none";
            document.getElementById('step-qris').style.display = "block";
            mulaiPolling();
        } catch (e) { 
            alert("Error: " + e.message);
            btn.disabled = false;
            btn.innerHTML = "Coba Lagi";
        }
    }

    function mulaiPolling() {
        pollingInterval = setInterval(async () => {
            const res = await fetch(`${VERCEL_URL}/api/check-status`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ transactionId: cashifyTransactionId })
            });
            const json = await res.json();
            if (json.data?.status?.toLowerCase() === 'paid') {
                clearInterval(pollingInterval);
                prosesLunas();
            }
        }, 5000);
    }

    async function prosesLunas() {
        const trxId = "TRX-" + Date.now();
        await fetch(`${BASE_URL}transaksi/${trxId}.json`, {
            method: "PUT",
            body: JSON.stringify({ produk: produkCache[selectedProdId].nama, data: selectedDataAkun, pembeli: document.getElementById('buyerName').value })
        });
        await fetch(`${BASE_URL}stok_akun/${selectedProdId}/${selectedAkunId}.json`, { method: "DELETE" });
        document.getElementById('step-qris').style.display = "none";
        document.getElementById('step-success').style.display = "block";
        document.getElementById('finalData').innerText = selectedDataAkun;
    }

    function closeModal() { document.getElementById('paymentModal').style.display = "none"; clearInterval(pollingInterval); }
    function openInvoiceModal() { document.getElementById('invoiceModal').style.display = "block"; }
    function closeInvoiceModal() { document.getElementById('invoiceModal').style.display = "none"; }

    fetchProducts();
</script>
</body>
</html>
