<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toko Tama Premium | Digital Store</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root {
            --primary: #f5b041;
            --bg-dark: #0b0d0f;
            --card-bg: #161a1e;
            --border: #242a32;
            --text-gray: #8e959e;
            --success: #10b981;
            --danger: #ef4444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg-dark); color: #ffffff; padding: 20px; max-width: 500px; margin: auto; overflow-x: hidden; }

        .toast { position: fixed; top: -100px; left: 50%; transform: translateX(-50%); background: var(--danger); color: white; padding: 12px 25px; border-radius: 12px; font-size: 13px; font-weight: bold; z-index: 10000; transition: 0.5s; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .toast.show { top: 30px; }
        .toast.success { background: var(--success); }

        .header { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; margin-bottom: 25px; text-align: center; }
        .profile-img { width: 80px; height: 80px; border-radius: 50%; border: 2px solid var(--primary); background: #222; overflow: hidden; }
        .store-name { font-size: 1.4rem; font-weight: 700; }

        .stats-container { display: flex; justify-content: space-around; background: var(--card-bg); padding: 15px; border-radius: 12px; margin: 20px 0; border: 1px solid var(--border); }
        .stat-box { text-align: center; }
        .stat-val { font-size: 20px; font-weight: bold; color: var(--primary); }
        .stat-label { font-size: 11px; color: var(--text-gray); text-transform: uppercase; margin-top: 5px; }

        .btn-cek-nav { background: var(--card-bg); border: 1px solid var(--border); color: var(--primary); padding: 12px; border-radius: 15px; width: 100%; margin-bottom: 20px; font-size: 13px; font-weight: bold; cursor: pointer; }

        #productList { display: flex; flex-direction: column; gap: 15px; }
        .card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 20px; padding: 20px; position: relative; transition: 0.2s; cursor: pointer; }
        .card:active { transform: scale(0.98); }
        .price { color: var(--primary); font-size: 18px; font-weight: 800; }
        .stock-tag { position: absolute; top: 15px; right: 15px; font-size: 10px; font-weight: 700; padding: 2px 10px; border-radius: 12px; }
        .tag-red { background: rgba(239, 68, 68, 0.1); color: var(--danger); }
        .tag-green { background: rgba(16, 185, 129, 0.1); color: var(--success); }

        .modal { display: none; position: fixed; z-index: 9999; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); backdrop-filter: blur(10px); }
        .modal-content { position: fixed; bottom: 0; width: 100%; background: var(--card-bg); padding: 25px 25px 40px 25px; border-radius: 35px 35px 0 0; border-top: 1px solid var(--border); max-width: 500px; left: 50%; transform: translateX(-50%); animation: slideUp 0.4s ease; max-height: 90vh; overflow-y: auto; }
        @keyframes slideUp { from { transform: translate(-50%, 100%); } to { transform: translate(-50%, 0); } }

        .sheet-input { width: 100%; background: var(--bg-dark); border: 2px solid var(--border); padding: 16px; color: white; border-radius: 16px; outline: none; font-size: 14px; margin-bottom: 15px; }
        .btn-buy { background: #4f46e5; color: white; border: none; padding: 18px; width: 100%; border-radius: 18px; font-weight: bold; cursor: pointer; }

        .qris-box { background: white; border-radius: 20px; padding: 15px; margin: 15px auto; width: fit-content; min-height: 200px; display: flex; align-items: center; justify-content: center; }
        
        /* BOX RINCIAN BIAYA & JAM */
        .payment-info { background: var(--bg-dark); border: 1px solid var(--border); border-radius: 15px; padding: 15px; margin: 15px 0; font-size: 13px; text-align: left; }
        .info-row { display: flex; justify-content: space-between; margin-bottom: 8px; color: var(--text-gray); }
        .info-row b { color: #fff; }
        .total-row { border-top: 1px dashed var(--border); padding-top: 10px; margin-top: 10px; font-size: 16px; }
        .total-row strong { color: var(--primary); font-size: 22px; }

        .timer-box { color: var(--danger); font-weight: 800; font-size: 14px; margin-top: 10px; background: rgba(239, 68, 68, 0.1); padding: 8px; border-radius: 10px; }

        .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.8s linear infinite; vertical-align: middle; margin-right: 6px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .data-box { background: #000; border: 1px solid var(--primary); padding: 18px; border-radius: 16px; margin-top: 20px; color: var(--primary); font-family: monospace; word-break: break-all; }
    </style>
</head>
<body>

<div id="errorToast" class="toast">Pesan Error</div>

<div class="header">
    <div class="profile-img"><img src="https://via.placeholder.com/150" width="100%"></div>
    <div class="store-name">Toko Tama Premium</div>
</div>

<div class="stats-container">
    <div class="stat-box"><div class="stat-val" id="totalProd">0</div><div class="stat-label">Total</div></div>
    <div class="stat-box"><div class="stat-val" id="totalStok">0</div><div class="stat-label">Ready</div></div>
    <div class="stat-box"><div class="stat-val" id="totalTersedia">0</div><div class="stat-label">Produk</div></div>
</div>

<button class="btn-cek-nav" onclick="openInvoiceModal()">🔍 CEK INVOICE / AMBIL AKUN</button>
<div id="productList"></div>

<div id="paymentModal" class="modal">
    <div class="modal-content">
        <div id="step-input">
            <h2 id="payTitle">Produk</h2>
            <br>
            <input type="text" id="buyerName" class="sheet-input" placeholder="Nama Lengkap">
            <input type="email" id="buyerEmail" class="sheet-input" placeholder="Email Aktif">
            <div id="payPrice" style="font-size:24px; font-weight:900; margin-bottom:25px; color:var(--primary); text-align:center;"></div>
            <button class="btn-buy" id="btnLanjutkan" onclick="tampilkanQRIS()">Lanjutkan Pembayaran</button>
        </div>

        <div id="step-qris" style="display:none; text-align:center;">
            <h3>Scan QRIS untuk Bayar</h3>
            <div class="timer-box">Selesaikan dalam: <span id="countdown">15:00</span></div>
            
            <div class="qris-box" id="qrisCanvas"><span class="spinner"></span></div>
            
            <div class="payment-info">
                <div class="info-row"><span>Harga Produk</span> <b id="infoHarga">Rp 0</b></div>
                <div class="info-row"><span>Biaya Admin</span> <b id="infoFee">Rp 1.000</b></div>
                <div class="info-row"><span>Kode Unik</span> <b id="infoUnik">Rp 10</b></div>
                <div class="info-row total-row"><span>Total Bayar</span> <strong id="totalAmountDisplay">Rp 0</strong></div>
            </div>

            <p style="font-size: 11px; color: var(--text-gray); margin-bottom: 15px;">Transfer harus <b>PERSIS</b> sampai 3 angka terakhir agar otomatis.</p>

            <button class="btn-buy" disabled style="background:#242a32;">
                <span class="spinner"></span>MENUNGGU PEMBAYARAN...
            </button>
        </div>

        <div id="step-success" style="display:none; text-align:center;">
            <div style="font-size:50px; margin-bottom:10px;">✨</div>
            <h3>Berhasil Terbayar!</h3>
            <div class="data-box" id="finalData"></div>
            <button class="btn-buy" style="background:var(--primary); color:black; margin-top:20px;" onclick="copyData()">SALIN DATA AKUN</button>
            <button class="btn-buy" style="background:#242a32; margin-top:10px;" onclick="location.reload()">SELESAI</button>
        </div>

        <button id="btnClose" onclick="closeModal()" style="background:none; border:none; color:var(--danger); width:100%; margin-top:25px; cursor:pointer; font-weight:800;">BATALKAN</button>
    </div>
</div>

<div id="invoiceModal" class="modal">
    <div class="modal-content" style="bottom:auto; top:50%; transform:translate(-50%, -50%); border-radius:25px; width:90%">
        <h2>Cek Invoice</h2>
        <input type="text" id="inputTrxId" class="sheet-input" placeholder="TRX-123456" style="margin-top:20px;">
        <button class="btn-buy" onclick="cariInvoice()">CARI PESANAN</button>
        <div id="invoiceResult" style="margin-top:15px;"></div>
        <button onclick="closeInvoiceModal()" style="background:none; border:none; color:var(--text-gray); width:100%; margin-top:15px;">TUTUP</button>
    </div>
</div>

<script>
    const BASE_URL = "https://toko-tama-default-rtdb.asia-southeast1.firebasedatabase.app/";
    const CASHIFY_QRIS_ID = "8aa46a5a-ac64-44b4-b20d-2d1e1bbe1ec1";

    const produkCache = {};
    let selectedProdId, selectedAkunId, selectedDataAkun, hargaFix, cashifyTransactionId, pollingInterval, timerInterval;

    function showToast(msg, type = "error") {
        const t = document.getElementById('errorToast');
        t.innerText = msg;
        t.className = "toast" + (type === "success" ? " success" : "") + " show";
        setTimeout(() => t.classList.remove('show'), 3500);
    }

    async function fetchProducts() {
        try {
            const [resP, resS] = await Promise.all([fetch(`${BASE_URL}produk.json`), fetch(`${BASE_URL}stok_akun.json`)]);
            const dataP = await resP.json();
            const dataS = await resS.json() || {};
            const container = document.getElementById('productList');
            container.innerHTML = '';
            Object.keys(dataP).forEach(id => {
                const listAkun = dataS[id] ? Object.keys(dataS[id]) : [];
                const jmlStok = listAkun.length;
                produkCache[id] = { nama: dataP[id].nama, harga: dataP[id].harga, stok: dataS[id] || {} };
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `<div class="stock-tag ${jmlStok === 0 ? 'tag-red' : 'tag-green'}">${jmlStok === 0 ? 'Habis' : jmlStok + ' Ready'}</div><div class="card-title">${dataP[id].nama}</div><div class="price">Rp ${parseInt(dataP[id].harga).toLocaleString('id-ID')}</div>`;
                card.onclick = () => jmlStok === 0 ? showToast('Stok habis!') : openPayment(id);
                container.appendChild(card);
            });
            document.getElementById('totalProd').innerText = Object.keys(dataP).length;
            document.getElementById('totalStok').innerText = Object.values(dataS).reduce((a, b) => a + Object.keys(b).length, 0);
        } catch (e) { console.error(e); }
    }

    function openPayment(id) {
        const p = produkCache[id];
        selectedProdId = id;
        selectedAkunId = Object.keys(p.stok)[0];
        selectedDataAkun = p.stok[selectedAkunId];
        hargaFix = parseInt(String(p.harga).replace(/\D/g, ''));
        document.getElementById('payTitle').innerText = p.nama;
        document.getElementById('payPrice').innerText = "Rp " + hargaFix.toLocaleString('id-ID');
        document.getElementById('paymentModal').style.display = 'block';
    }

    async function tampilkanQRIS() {
        const nama = document.getElementById('buyerName').value.trim();
        const email = document.getElementById('buyerEmail').value.trim();
        if (!nama || !email) return showToast("Lengkapi data!");

        const btn = document.getElementById('btnLanjutkan');
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner"></span>Membuat QRIS...';

        try {
            const feeAdmin = 1000;
            const kodeUnik = 10;
            const totalBayarRequest = hargaFix + feeAdmin + kodeUnik;

            const res = await fetch('/api/generate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id: CASHIFY_QRIS_ID, amount: totalBayarRequest, useUniqueCode: false, expiredInMinutes: 15 })
            });

            const json = await res.json();
            if (!json.data) throw new Error(json.error || "Gagal");

            cashifyTransactionId = json.data.transactionId;
            document.getElementById('step-input').style.display = 'none';
            document.getElementById('step-qris').style.display = 'block';

            document.getElementById('qrisCanvas').innerHTML = '';
            new QRCode(document.getElementById('qrisCanvas'), { text: json.data.qr_string, width: 200, height: 200 });

            // ISI DATA RINCIAN
            document.getElementById('infoHarga').innerText = "Rp " + hargaFix.toLocaleString('id-ID');
            document.getElementById('totalAmountDisplay').innerText = "Rp " + totalBayarRequest.toLocaleString('id-ID');
            
            startTimer(15 * 60);
            mulaiPolling();
        } catch (e) {
            showToast("Gagal: " + e.message);
            btn.disabled = false;
            btn.innerText = "Coba Lagi";
        }
    }

    function startTimer(duration) {
        let timer = duration, minutes, seconds;
        if (timerInterval) clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            minutes = parseInt(timer / 60, 10);
            seconds = parseInt(timer % 60, 10);
            minutes = minutes < 10 ? "0" + minutes : minutes;
            seconds = seconds < 10 ? "0" + seconds : seconds;
            document.getElementById('countdown').textContent = minutes + ":" + seconds;
            if (--timer < 0) { clearInterval(timerInterval); closeModal(); alert("Waktu Pembayaran Habis!"); }
        }, 1000);
    }

    function mulaiPolling() {
        if (pollingInterval) clearInterval(pollingInterval);
        pollingInterval = setInterval(async () => {
            try {
                const res = await fetch('/api/check-status', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ transactionId: cashifyTransactionId })
                });
                const json = await res.json();
                if (json.data?.status?.toLowerCase() === 'paid') {
                    clearInterval(pollingInterval);
                    clearInterval(timerInterval);
                    prosesLunas();
                }
            } catch (e) {}
        }, 5000);
    }

    async function prosesLunas() {
        const trxId = "TRX-" + Math.floor(100000 + Math.random() * 900000);
        try {
            await fetch(`${BASE_URL}transaksi/${trxId}.json`, { method: 'PUT', body: JSON.stringify({ produk: produkCache[selectedProdId].nama, data: selectedDataAkun, pembeli: document.getElementById('buyerName').value, email: document.getElementById('buyerEmail').value, tanggal: new Date().toLocaleString() }) });
            await fetch(`${BASE_URL}stok_akun/${selectedProdId}/${selectedAkunId}.json`, { method: 'DELETE' });
            document.getElementById('step-qris').style.display = 'none';
            document.getElementById('step-success').style.display = 'block';
            document.getElementById('finalData').innerText = selectedDataAkun;
            showToast("Pembayaran Berhasil!", "success");
        } catch (e) { console.error(e); }
    }

    function closeModal() { document.getElementById('paymentModal').style.display = 'none'; clearInterval(pollingInterval); clearInterval(timerInterval); }
    function openInvoiceModal() { document.getElementById('invoiceModal').style.display = 'block'; }
    function closeInvoiceModal() { document.getElementById('invoiceModal').style.display = 'none'; }
    function copyData() { navigator.clipboard.writeText(document.getElementById('finalData').innerText).then(() => showToast("Tersalin!", "success")); }

    fetchProducts();
</script>
</body>
</html>
