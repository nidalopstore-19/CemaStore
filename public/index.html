<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NIDALOP STORE WEB</title>
    
    <style>
        /* --- 1. PRELOADER --- */
        #preloader {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 999999999;
            transition: opacity 1s cubic-bezier(0.4, 0, 0.2, 1);
        }
        #preloader.fade-out { opacity: 0; visibility: hidden; }
        .orbit-container { position: relative; width: 85px; height: 85px; }
        .orbit-ring { position: absolute; width: 100%; height: 100%; border: 2px solid rgba(255, 255, 255, 0.05); border-radius: 50%; }
        .orbit-spinner { position: absolute; width: 100%; height: 100%; border-radius: 50%; animation: orbit-spin 1.2s linear infinite; }
        .orbit-ball { 
            position: absolute; top: -8px; left: 50%; width: 16px; height: 16px; 
            background-color: var(--primary-red, #ffffff); border-radius: 50%; transform: translateX(-50%);
            box-shadow: 0 0 15px var(--primary-red, #ffffff), 0 0 30px var(--primary-red, #ffffff);
        }
        @keyframes orbit-spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* --- 2. LAYOUT NORMAL --- */
        :root { --primary-red: #ffffff; --card-bg: rgba(22, 26, 30, 0.7); --success-green: #10b981; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        
        body { 
            background-color: #0b0d0f; 
            background-size: cover !important;
            background-position: center !important;
            background-attachment: fixed !important;
            color: #ffffff; 
            max-width: 500px; 
            margin: auto; 
            min-height: 100vh;
            padding: 25px 15px;
        }

        #liveClock { font-size: 10.5px; color: #8e959e; font-weight: 700; letter-spacing: 1px; margin-top: 8px; text-transform: uppercase; text-align: center; }
        .header { text-align: center; margin-bottom: 25px; }
        .profile-img { width: 85px; height: 85px; border-radius: 50%; border: 2px solid var(--primary-red); margin: 0 auto 12px; overflow: hidden; background: #000; }
        .store-name { font-size: 1.4rem; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; }

        /* --- INFO TABLE QRIS RAPI --- */
        .qr-info-table { width: 100%; border-collapse: collapse; margin-bottom: 15px; border-radius: 12px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); }
        .qr-info-table td { padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); text-align: left; background: #0b0d0f; }
        .qr-info-label { font-size: 10px; color: #8e959e; font-weight: bold; text-transform: uppercase; margin-bottom: 2px; }
        .qr-info-value { font-size: 13px; font-weight: 700; color: #fff; }

        .toast { position: fixed; top: -100px; left: 50%; transform: translateX(-50%); background: var(--primary-red); color: white; padding: 12px 20px; border-radius: 12px; font-size: 13px; font-weight: bold; z-index: 10000; transition: 0.5s; width: 90%; text-align: center; opacity: 0; }
        .toast.show { top: 20px; opacity: 1; }

        .btn-buy { background: var(--primary-red); color: white; border: none; padding: 16px; width: 100%; border-radius: 14px; font-weight: bold; cursor: pointer; }
        .sheet-input { width: 100%; background: #0b0d0f; border: 1.5px solid #242a32; padding: 14px; color: white; border-radius: 14px; margin-bottom: 12px; }
        
        .modal { display: none; position: fixed; z-index: 99999; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); }
        .modal-content { position: fixed; bottom: 0; width: 100%; max-width: 500px; background: #161a1e; padding: 25px 20px; border-radius: 30px 30px 0 0; border-top: 2px solid var(--primary-red); left: 50%; transform: translateX(-50%); max-height: 90vh; overflow-y: auto; }
        
        #productList { display: flex; flex-direction: column; gap: 12px; }
        .card { background: var(--card-bg); border-radius: 18px; padding: 15px; display: flex; align-items: center; gap: 15px; border: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body>

<div id="preloader">
    <div class="orbit-container">
        <div class="orbit-ring"></div>
        <div class="orbit-spinner"><div class="orbit-ball"></div></div>
    </div>
</div>

<div id="errorToast" class="toast">Pesan</div>

<div class="header">
    <div class="profile-img"><img id="storePP" src="" width="100%" height="100%" style="object-fit: cover;"></div>
    <div class="store-name" id="storeNameLabel">MY STORE</div>
    <div id="liveClock">MEMUAT WAKTU...</div>
</div>

<div id="productList"></div>

<div id="paymentModal" class="modal">
    <div class="modal-content">
        <div id="step-input">
            <h2 id="payTitle" style="color:var(--primary-red); margin-bottom:20px;">Produk</h2>
            <input type="text" id="buyerName" class="sheet-input" placeholder="Nama Lengkap">
            <input type="email" id="buyerEmail" class="sheet-input" placeholder="Email Aktif">
            <button class="btn-buy" id="btnLanjutkan" onclick="tampilkanQRIS()">Lanjutkan</button>
        </div>

        <div id="step-qris" style="display:none; text-align:center;">
            <h3 style="color:var(--primary-red); margin-bottom:15px;">PEMBAYARAN QRIS</h3>
            
            <table class="qr-info-table">
                <tr>
                    <td><div class="qr-info-label">Nama</div><div id="qrName" class="qr-info-value">—</div></td>
                    <td><div class="qr-info-label">ID QRIS</div><div id="qrId" class="qr-info-value" style="color:var(--primary-red)">—</div></td>
                </tr>
                <tr>
                    <td><div class="qr-info-label">Waktu Buat</div><div id="qrTime" class="qr-info-value">—</div></td>
                    <td><div class="qr-info-label">Berlaku</div><div id="qrExp" class="qr-info-value" style="color:var(--success-green)">15:00</div></td>
                </tr>
                <tr>
                    <td><div class="qr-info-label">Harga Asli</div><div id="qrPriceOri" class="qr-info-value">—</div></td>
                    <td><div class="qr-info-label">Code Cantik</div><div id="qrUnique" class="qr-info-value" style="color:orange">+ Rp 0</div></td>
                </tr>
            </table>

            <div style="background: #fff; padding: 10px; border-radius: 15px; width: fit-content; margin: 0 auto 15px;">
                <img id="qrisImg" src="" style="width: 200px; display: block;">
            </div>

            <div style="background: #0b0d0f; padding: 15px; border-radius: 12px; border: 1.5px dashed var(--primary-red); margin-bottom: 15px;">
                <span style="font-size: 11px; color: #8e959e;">TOTAL BAYAR</span><br>
                <strong id="totalAmountDisplay" style="color: var(--primary-red); font-size: 22px;">Rp 0</strong>
            </div>

            <button class="btn-buy" disabled style="background:#242a32;">MENUNGGU PEMBAYARAN...</button>
        </div>

        <div id="step-success" style="display:none; text-align:center;">
            <h3 style="color:var(--success-green);">LUNAS!</h3>
            <div id="finalData" style="background:#000; padding:15px; border-radius:12px; margin:15px 0; word-break:break-all; font-family:monospace; color:var(--success-green); border:1px solid var(--success-green);"></div>
            <button class="btn-buy" onclick="location.reload()">TUTUP</button>
        </div>
        <button onclick="closeModal()" style="background:none; border:none; color:#888; width:100%; margin-top:15px; cursor:pointer;">KEMBALI</button>
    </div>
</div>

<script>
    const BASE_URL = "https://toko-tama-default-rtdb.asia-southeast1.firebasedatabase.app/";
    const CASHIFY_QRIS_ID = "0f3aedc9-d0c2-4d18-8922-8d54e7e46da9";
    const produkCache = {};
    let selectedProdId, selectedAkunId, selectedDataAkun, hargaFix, cashifyTransactionId, pollingInterval, countdownInterval;

    function getFullDate() {
        const now = new Date();
        const days = ["MINGGU", "SENIN", "SELASA", "RABU", "KAMIS", "JUMAT", "SABTU"];
        const months = ["JAN", "FEB", "MAR", "APR", "MEI", "JUN", "JUL", "AGU", "SEP", "OKT", "NOV", "DES"];
        return `${days[now.getDay()]}, ${now.getDate()} ${months[now.getMonth()]} ${now.getFullYear()} | ${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
    }

    async function initWeb() {
        setInterval(() => { document.getElementById('liveClock').innerText = getFullDate(); }, 1000);
        try {
            const res = await fetch(`${BASE_URL}owner_config.json`);
            const config = await res.json();
            if (config) {
                document.body.style.backgroundImage = `url('${config.bg}')`;
                document.getElementById('storeNameLabel').innerText = config.storeName;
                if(config.pp) document.getElementById('storePP').src = config.pp;
                const style = document.createElement('style');
                style.innerHTML = `:root { --primary-red: ${config.colors.primary}; } .card, .modal-content { background: ${config.colors.card}; backdrop-filter: blur(10px); }`;
                document.head.appendChild(style);
            }
            await fetchProducts();
            document.getElementById('preloader').classList.add('fade-out');
        } catch (e) { document.getElementById('preloader').style.display='none'; }
    }

    async function fetchProducts() {
        const [resP, resS] = await Promise.all([fetch(`${BASE_URL}produk.json`), fetch(`${BASE_URL}stok_akun.json`)]);
        const dataP = await resP.json(); const dataS = await resS.json() || {};
        const container = document.getElementById('productList');
        Object.keys(dataP).forEach(id => {
            const stk = dataS[id] ? Object.keys(dataS[id]) : [];
            produkCache[id] = { nama: dataP[id].nama, harga: dataP[id].harga, stok: dataS[id] || {} };
            container.innerHTML += `<div class="card" onclick="openPayment('${id}')">
                <img src="${dataP[id].logo}" width="50" height="50" style="border-radius:10px;">
                <div style="flex-grow:1;"><div style="font-weight:700;">${dataP[id].nama}</div><div style="color:var(--primary-red); font-weight:800;">Rp ${parseInt(dataP[id].harga).toLocaleString('id-ID')}</div></div>
                <div style="font-size:10px; background:rgba(16,185,129,0.1); color:#10b981; padding:4px 8px; border-radius:8px;">READY</div>
            </div>`;
        });
    }

    function openPayment(id) {
        selectedProdId = id;
        const p = produkCache[id];
        selectedAkunId = Object.keys(p.stok)[0];
        selectedDataAkun = p.stok[selectedAkunId];
        hargaFix = parseInt(p.harga);
        document.getElementById('payTitle').innerText = p.nama;
        document.getElementById('paymentModal').style.display = 'block';
    }

    async function tampilkanQRIS() {
        const n = document.getElementById('buyerName').value;
        const e = document.getElementById('buyerEmail').value;
        if(!n || !e) return alert("Isi data!");
        
        const btn = document.getElementById('btnLanjutkan');
        btn.disabled = true; btn.innerText = "Generating...";

        try {
            const res = await fetch('/api/generate', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ id: CASHIFY_QRIS_ID, amount: hargaFix, useUniqueCode: true }) });
            const json = await res.json();
            const { qr_string, transactionId, totalAmount } = json.data;

            document.getElementById('qrisImg').src = `https://larabert-qrgen.hf.space/v1/create-qr-code?data=${encodeURIComponent(qr_string)}`;
            
            // ISI DATA TABEL RAPI
            document.getElementById('qrName').innerText = n.split(' ')[0].toUpperCase();
            document.getElementById('qrId').innerText = transactionId;
            document.getElementById('qrTime').innerText = getFullDate().split('|')[1].trim();
            document.getElementById('qrPriceOri').innerText = "Rp " + hargaFix.toLocaleString('id-ID');
            document.getElementById('qrUnique').innerText = "+ Rp " + (totalAmount - hargaFix);
            document.getElementById('totalAmountDisplay').innerText = "Rp " + totalAmount.toLocaleString('id-ID');

            document.getElementById('step-input').style.display = 'none';
            document.getElementById('step-qris').style.display = 'block';
            cashifyTransactionId = transactionId;
            startCountdown(900);
            mulaiPolling();
        } catch(err) { alert("Gagal!"); btn.disabled = false; }
    }

    function startCountdown(t) {
        countdownInterval = setInterval(() => {
            let m = Math.floor(t/60), s = t%60;
            document.getElementById('qrExp').innerText = `${m}:${s<10?'0':''}${s}`;
            if (--t < 0) clearInterval(countdownInterval);
        }, 1000);
    }

    function mulaiPolling() {
        pollingInterval = setInterval(async () => {
            const res = await fetch('/api/check-status', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ transactionId: cashifyTransactionId }) });
            const json = await res.json();
            if (json.data?.status === 'paid') {
                clearInterval(pollingInterval);
                document.getElementById('step-qris').style.display = 'none';
                document.getElementById('step-success').style.display = 'block';
                document.getElementById('finalData').innerText = selectedDataAkun;
                await fetch(`${BASE_URL}stok_akun/${selectedProdId}/${selectedAkunId}.json`, { method: 'DELETE' });
            }
        }, 5000);
    }

    function closeModal() { location.reload(); }
    initWeb();
</script>
</body>
</html>
