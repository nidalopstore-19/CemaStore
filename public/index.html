<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NIDALOP STORE WEB</title>
    <style>
        :root {
            --primary-red: #ea580c;
            --dark-bg: #0b0d0f;
            --card-bg: rgba(22, 26, 30, 0.7);
            --success-green: #10b981;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { 
            background-color: var(--dark-bg);
            background-image: radial-gradient(circle at top right, rgba(234, 88, 12, 0.1), transparent 300px);
            background-attachment: fixed;
            color: #ffffff; 
            padding: 15px; 
            max-width: 500px; 
            margin: auto; 
            overflow-x: hidden; 
        }

        .toast { position: fixed; top: -100px; left: 50%; transform: translateX(-50%); background: var(--primary-red); color: white; padding: 12px 20px; border-radius: 12px; font-size: 13px; font-weight: bold; z-index: 10000; transition: 0.5s; box-shadow: 0 10px 20px rgba(0,0,0,0.4); width: 90%; max-width: 400px; text-align: center; }
        .toast.show { top: 20px; }
        .toast.success { background: var(--success-green); }

        .header { text-align: center; margin-bottom: 20px; padding-top: 10px; }
        .profile-img { width: 75px; height: 75px; border-radius: 50%; border: 2px solid var(--primary-red); margin: 0 auto 10px; overflow: hidden; box-shadow: 0 0 15px rgba(234, 88, 12, 0.3); }
        .store-name { font-size: 1.3rem; font-weight: 800; letter-spacing: 0.5px; text-transform: uppercase; }

        .stats-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        .stat-box { background: var(--card-bg); padding: 12px 5px; border-radius: 15px; text-align: center; border: 1px solid #242a32; }
        .stat-val { font-size: 18px; font-weight: 800; color: var(--primary-red); }
        .stat-label { font-size: 9px; color: #8e959e; text-transform: uppercase; margin-top: 4px; font-weight: bold; }

        .btn-cek-nav { background: var(--card-bg); border: 1px solid #331010; color: var(--primary-red); padding: 12px; border-radius: 15px; width: 100%; margin-bottom: 15px; font-size: 12px; font-weight: bold; cursor: pointer; transition: 0.2s; }

        #productList { display: flex; flex-direction: column; gap: 12px; }
        .card { background: var(--card-bg); border: 1px solid #242a32; border-radius: 18px; padding: 18px; position: relative; cursor: pointer; backdrop-filter: blur(10px); transition: transform 0.2s; }
        .card:active { transform: scale(0.98); }
        .card-title { font-size: 15px; font-weight: 600; margin-bottom: 4px; padding-right: 70px; }
        .price { color: var(--primary-red); font-size: 18px; font-weight: 800; }
        
        .stock-tag { position: absolute; top: 18px; right: 15px; font-size: 10px; font-weight: 800; padding: 3px 8px; border-radius: 8px; }
        .tag-red { background: rgba(234, 88, 12, 0.1); color: var(--primary-red); border: 1px solid var(--primary-red); }
        .tag-green { background: rgba(16, 185, 129, 0.1); color: var(--success-green); border: 1px solid var(--success-green); }

        .modal { display: none; position: fixed; z-index: 9999; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); }
        .modal-content { 
            position: fixed; bottom: 0; width: 100%; max-width: 500px;
            background: #161a1e; padding: 25px 20px 35px; border-radius: 30px 30px 0 0; 
            border-top: 2px solid var(--primary-red); left: 50%; transform: translateX(-50%); 
            max-height: 95vh; overflow-y: auto; 
        }

        .sheet-input { width: 100%; background: #0b0d0f; border: 1.5px solid #242a32; padding: 14px; color: white; border-radius: 14px; outline: none; font-size: 14px; margin-bottom: 12px; }
        .sheet-input:focus { border-color: var(--primary-red); }

        .btn-buy { background: var(--primary-red); color: white; border: none; padding: 16px; width: 100%; border-radius: 14px; font-weight: bold; cursor: pointer; font-size: 14px; }
        .btn-buy:disabled { background: #242a32; opacity: 0.7; cursor: not-allowed; }

        /* QR Box */
        .qris-box { 
            background: white; 
            border-radius: 15px; 
            padding: 10px; 
            margin: 15px auto; 
            width: fit-content; 
            line-height: 0; 
            position: relative;
            min-width: 180px;
            min-height: 180px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .qris-box img { 
            width: 200px !important; 
            height: 200px !important; 
            display: block;
            border-radius: 8px;
        }
        .qris-box .qr-loading {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: white;
            border-radius: 15px;
            z-index: 2;
        }

        /* QR Info Cards */
        .qr-info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin: 10px 0;
        }
        .qr-info-card {
            background: #0b0d0f;
            border: 1.5px solid #242a32;
            border-radius: 12px;
            padding: 10px 12px;
            text-align: center;
        }
        .qr-info-label {
            font-size: 9px;
            color: #8e959e;
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }
        .qr-info-value {
            font-family: monospace;
            font-size: 11px;
            color: var(--primary-red);
            font-weight: 700;
            word-break: break-all;
        }
        .qr-info-value.green { color: var(--success-green); }

        /* Expired countdown */
        .expired-badge {
            background: rgba(234, 88, 12, 0.1);
            border: 1.5px solid var(--primary-red);
            border-radius: 10px;
            padding: 8px 14px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            font-weight: 700;
            color: var(--primary-red);
            margin: 8px auto;
        }
        .expired-badge .dot {
            width: 6px; height: 6px;
            background: var(--primary-red);
            border-radius: 50%;
            animation: pulse 1s infinite;
        }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

        .amount-highlight { background: #0b0d0f; border: 1.5px dashed var(--primary-red); border-radius: 12px; padding: 12px; text-align: center; margin: 10px 0; }
        .amount-highlight strong { color: var(--primary-red); font-size: 20px; font-weight: 800; }
        
        .data-box { background: #000; border: 1.5px dashed var(--success-green); padding: 15px; border-radius: 12px; margin-top: 15px; color: var(--success-green); font-family: monospace; font-size: 14px; word-break: break-all; text-align: left; position: relative; }

        .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.8s linear infinite; margin-right: 8px; vertical-align: middle; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* QR loading spinner (dark on white bg) */
        .qr-spinner { display: inline-block; width: 30px; height: 30px; border: 3px solid rgba(0,0,0,0.15); border-top-color: var(--primary-red); border-radius: 50%; animation: spin 0.8s linear infinite; }
    </style>
</head>
<body>

<div id="errorToast" class="toast">Pesan Error</div>

<div class="header clayza">
    <div class="profile-img"><img src="https://raw.githubusercontent.com/bagus-api/storage/master/VpPBE.jpg" width="100%" height="100%" style="object-fit: cover;"></div>
    <div class="store-name">NIDALOP STORE</div>
</div>

<div class="stats-container clayza">
    <div class="stat-box"><div class="stat-val" id="totalProd">0</div><div class="stat-label">Total</div></div>
    <div class="stat-box"><div class="stat-val" id="totalStok">0</div><div class="stat-label">Ready</div></div>
    <div class="stat-box"><div class="stat-val" id="totalTersedia">0</div><div class="stat-label">Produk</div></div>
</div>

<button class="btn-cek-nav" onclick="openInvoiceModal()">🔍 CEK INVOICE / AMBIL AKUN</button>
<div id="productList"></div>

<!-- Payment Modal -->
<div id="paymentModal" class="modal">
    <div class="modal-content clayza">

        <!-- Step 1: Input -->
        <div id="step-input">
            <h2 id="payTitle" style="color:var(--primary-red); margin-bottom:5px;">Produk</h2>
            <p style="font-size:12px; color:#8e959e; margin-bottom:20px;">Lengkapi data di bawah ini</p>
            <input type="text" id="buyerName" class="sheet-input" placeholder="Nama Lengkap">
            <input type="email" id="buyerEmail" class="sheet-input" placeholder="Email Aktif">
            <div id="payPrice" style="font-size:22px; font-weight:900; margin-bottom:20px; color:var(--primary-red); text-align:center;"></div>
            <button class="btn-buy" id="btnLanjutkan" onclick="tampilkanQRIS()">Lanjutkan</button>
        </div>

        <!-- Step 2: QRIS -->
        <div id="step-qris" style="display:none; text-align:center;">
            <h3 style="color:var(--primary-red); margin-bottom:4px;">SCAN QRIS</h3>
            <p style="font-size:11px; color:#8e959e; margin-bottom:8px;">Scan menggunakan DANA atau e-wallet lainnya</p>

            <!-- QR Info: ID + Expired -->
            <div class="qr-info-grid">
                <div class="qr-info-card">
                    <div class="qr-info-label">QR ID Transaksi</div>
                    <div class="qr-info-value" id="qrTransactionId">—</div>
                </div>
                <div class="qr-info-card">
                    <div class="qr-info-label">Berlaku</div>
                    <div class="qr-info-value green" id="qrExpiredInfo">—</div>
                </div>
            </div>

            <!-- Expired countdown badge -->
            <div style="display:flex; justify-content:center;">
                <div class="expired-badge">
                    <span class="dot"></span>
                    <span id="countdownDisplay">Memuat...</span>
                </div>
            </div>

            <!-- QR Image -->
            <div class="qris-box clayza" id="qrisWrapper">
                <div class="qr-loading" id="qrLoading">
                    <div class="qr-spinner"></div>
                </div>
                <img id="qrisImg" src="" alt="QRIS" style="display:none;" onload="onQrLoaded()" onerror="onQrError()">
            </div>

            <div class="amount-highlight clayza">
                <span style="display:block; font-size:10px; color:#8e959e; margin-bottom:3px;">TOTAL BAYAR</span>
                <strong id="totalAmountDisplay">Rp 0</strong>
            </div>
            <p style="font-size:10px; color:#8e959e; margin-bottom:15px;">
                Sudah termasuk kode unik <b id="uniqueCodeDisplay" style="color:var(--primary-red)">Rp 0</b>
            </p>
            <button class="btn-buy" disabled style="background:#242a32;">
                <span class="spinner"></span>MENUNGGU PEMBAYARAN...
            </button>
        </div>

        <!-- Step 3: Success -->
        <div id="step-success" style="display:none; text-align:center;">
            <div style="font-size:40px; margin-bottom:10px;">✅</div>
            <h3 style="color:var(--success-green);">SUKSES!</h3>
            <div class="data-box" id="finalData"></div>
            <button class="btn-buy" style="background:var(--success-green); margin-top:15px;" onclick="copyData('finalData')">SALIN AKUN</button>
            <button class="btn-buy" style="background:#242a32; margin-top:8px;" onclick="location.reload()">TUTUP</button>
        </div>

        <button id="btnClose" onclick="closeModal()" style="background:none; border:none; color:#888; width:100%; margin-top:20px; cursor:pointer; font-size:11px; font-weight:bold;">KEMBALI</button>
    </div>
</div>

<!-- Invoice Modal -->
<div id="invoiceModal" class="modal">
    <div class="modal-content clayza">
        <h2 style="color:var(--primary-red); margin-bottom:15px;">Cek Pesanan</h2>
        <input type="text" id="inputTrxId" class="sheet-input" placeholder="Masukkan ID Transaksi (TRX-xxxxxx)">
        <button class="btn-buy" onclick="cariInvoice()">CARI</button>
        <div id="invoiceResult"></div>
        <button onclick="closeInvoiceModal()" style="background:none; border:none; color:#8e959e; width:100%; margin-top:15px; cursor:pointer; font-size:12px;">TUTUP</button>
    </div>
</div>

<script>
    const BASE_URL = "https://toko-tama-default-rtdb.asia-southeast1.firebasedatabase.app/";
    const CASHIFY_QRIS_ID = "0f3aedc9-d0c2-4d18-8922-8d54e7e46da9";

    const _wm = ['header','stats-container','modal-content','qris-box','amount-highlight'];
    function _checkIntegrity() {
        const _sig = "Y2xheXph";
        const _dec = atob(_sig);
        const _nodes = _wm.map(c => document.querySelector('.' + c));
        const _valid = _nodes.every(n => n && n.classList.contains(_dec));
        if (!_valid) {
            document.body.innerHTML = '';
            document.body.style.cssText = 'background:#0b0d0f;display:flex;align-items:center;justify-content:center;height:100vh;margin:0;';
            document.body.innerHTML = '<div style="color:#ff4d4d;font-family:monospace;text-align:center;padding:20px;"><div style="font-size:48px;margin-bottom:16px;">&#9940;</div><div style="font-size:16px;font-weight:bold;letter-spacing:3px;color:#fff;">INTEGRITY ERROR</div><div style="font-size:11px;color:#555;margin-top:10px;">unauthorized modification detected</div></div>';
            throw new Error("integrity_check_failed");
        }
    }
  
    (function(){
        const _d=String.fromCharCode;
        const _a=_d(...[37,99,9889,32,80,111,119,101,114,101,100,32,98,121,32,67,108,97,121,122,97,32,65,117,98,101,114,116,32,37,99,32,104,116,116,112,115,58,47,47,99,108,97,121,122,97,46,105,115,45,97,46,100,101,118,32]);
        const _b=_d(...[98,97,99,107,103,114,111,117,110,100,58,35,101,97,53,56,48,99,59,99,111,108,111,114,58,35,102,102,102,59,102,111,110,116,45,119,101,105,103,104,116,58,98,111,108,100,59,102,111,110,116,45,115,105,122,101,58,49,51,112,120,59,112,97,100,100,105,110,103,58,54,112,120,32,49,48,112,120,59,98,111,114,100,101,114,45,114,97,100,105,117,115,58,54,112,120,32,48,32,48,32,54,112,120,59]);
        const _c=_d(...[98,97,99,107,103,114,111,117,110,100,58,35,49,97,49,97,49,97,59,99,111,108,111,114,58,35,101,97,53,56,48,99,59,102,111,110,116,45,115,105,122,101,58,49,51,112,120,59,112,97,100,100,105,110,103,58,54,112,120,32,49,48,112,120,59,98,111,114,100,101,114,45,114,97,100,105,117,115,58,48,32,54,112,120,32,54,112,120,32,48,59,98,111,114,100,101,114,58,49,112,120,32,115,111,108,105,100,32,35,101,97,53,56,48,99,59]);
        const _e=_d(...[37,99,68,97,116,101,32,67,114,101,97,116,101,32,58,32,48,51,32,77,97,114,101,116,32,50,48,50,54]);
        const _f=_d(...[99,111,108,111,114,58,35,56,56,56,59,102,111,110,116,45,115,105,122,101,58,49,48,112,120,59]);
        console.log(_a,_b,_c);
        console.log(_e,_f);
    })();

    const produkCache = {};
    let selectedProdId, selectedAkunId, selectedDataAkun, hargaFix;
    let cashifyTransactionId, pollingInterval = null;
    let countdownInterval = null;
    let expiredAt = null;

    function showToast(msg, type = "error") {
        const t = document.getElementById('errorToast');
        t.innerText = msg;
        t.className = "toast" + (type === "success" ? " success" : "");
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 3000);
    }

    async function fetchProducts() {
        _checkIntegrity();
        const container = document.getElementById('productList');
        try {
            const [resP, resS] = await Promise.all([
                fetch(`${BASE_URL}produk.json`),
                fetch(`${BASE_URL}stok_akun.json`)
            ]);
            const dataP = await resP.json();
            const dataS = await resS.json() || {};
            if (!dataP) return container.innerHTML = '<p>Kosong.</p>';
            container.innerHTML = '';
            let tP = 0, tS = 0, tT = 0;
            Object.keys(dataP).forEach(id => {
                tP++;
                const list = dataS[id] ? Object.keys(dataS[id]) : [];
                const jml = list.length;
                if (jml > 0) { tT++; tS += jml; }
                produkCache[id] = { nama: dataP[id].nama, harga: dataP[id].harga, stok: dataS[id] || {} };
                const hrg = "Rp " + parseInt(String(dataP[id].harga).replace(/\D/g, '')).toLocaleString('id-ID');
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="stock-tag ${jml === 0 ? 'tag-red' : 'tag-green'}">${jml === 0 ? 'Habis' : jml + ' Ready'}</div>
                    <div class="card-title">${dataP[id].nama}</div>
                    <div class="price">${hrg}</div>`;
                card.onclick = () => jml === 0 ? showToast('Stok habis!') : openPayment(id);
                container.appendChild(card);
            });
            document.getElementById('totalProd').innerText = tP;
            document.getElementById('totalStok').innerText = tS;
            document.getElementById('totalTersedia').innerText = tT;
        } catch (e) {
            container.innerHTML = '<p style="color:#8e959e; text-align:center; padding:20px;">Gagal memuat produk.</p>';
        }
    }

    function openPayment(id) {
        const p = produkCache[id];
        const list = Object.keys(p.stok);
        selectedProdId = id;
        selectedAkunId = list[0];
        selectedDataAkun = p.stok[selectedAkunId];
        hargaFix = parseInt(String(p.harga).replace(/\D/g, ''));
        document.getElementById('payTitle').innerText = p.nama;
        document.getElementById('payPrice').innerText = "Rp " + hargaFix.toLocaleString('id-ID');
        document.getElementById('paymentModal').style.display = 'block';
        document.getElementById('step-input').style.display = 'block';
        document.getElementById('step-qris').style.display = 'none';
        document.getElementById('step-success').style.display = 'none';
    }

    // ─── Cashify: Generate QRIS ───────────────────────────────────────────────
    async function tampilkanQRIS() {
        const n = document.getElementById('buyerName').value.trim();
        const e = document.getElementById('buyerEmail').value.trim();
        if (!n || !e) return showToast("Nama dan email wajib diisi!");

        const btn = document.getElementById('btnLanjutkan');
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner"></span>Memproses...';

        try {
            const res = await fetch('/api/generate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    id: CASHIFY_QRIS_ID,
                    amount: hargaFix,
                    useUniqueCode: true,
                    packageIds: ["id.dana"],
                    expiredInMinutes: 15
                })
            });

            const json = await res.json();

            if (!json.data || !json.data.qr_string) {
                throw new Error(json.message || 'Response tidak valid dari Cashify');
            }

            const { qr_string, transactionId, totalAmount, uniqueNominal, expiredAt: ea } = json.data;
            cashifyTransactionId = transactionId;
            expiredAt = ea ? new Date(ea) : new Date(Date.now() + 15 * 60 * 1000);

            // Tampilkan step QRIS
            document.getElementById('step-input').style.display = 'none';
            document.getElementById('step-qris').style.display = 'block';

            // Set QR ID & expired info
            const shortId = transactionId ? transactionId.slice(0, 18) + '...' : '—';
            document.getElementById('qrTransactionId').innerText = shortId;
            document.getElementById('qrTransactionId').title = transactionId;

            // Hitung berapa menit tersisa
            const msLeft = expiredAt - Date.now();
            const mntLeft = Math.ceil(msLeft / 60000);
            document.getElementById('qrExpiredInfo').innerText = mntLeft > 0 ? `${mntLeft} menit` : 'Segera';

            // Mulai countdown
            mulaiCountdown();

            // Set QR image dari larabert-qrgen
            const encodedQr = encodeURIComponent(qr_string);
            const qrUrl = `https://larabert-qrgen.hf.space/v1/create-qr-code?size=500x500&style=2&color=ff0000&data=${encodedQr}`;
            const qrImg = document.getElementById('qrisImg');
            qrImg.style.display = 'none';
            document.getElementById('qrLoading').style.display = 'flex';
            qrImg.src = qrUrl;

            // Set nominal
            document.getElementById('totalAmountDisplay').innerText = "Rp " + totalAmount.toLocaleString('id-ID');
            document.getElementById('uniqueCodeDisplay').innerText = "Rp " + (uniqueNominal || 0);

            mulaiPolling();

        } catch (err) {
            console.error('Cashify error:', err);
            showToast("Gagal membuat QRIS: " + (err.message || 'Coba lagi'));
            btn.disabled = false;
            btn.innerHTML = 'Lanjutkan';
        }
    }

    function onQrLoaded() {
        document.getElementById('qrLoading').style.display = 'none';
        document.getElementById('qrisImg').style.display = 'block';
    }

    function onQrError() {
        document.getElementById('qrLoading').innerHTML = '<p style="color:#8e959e; font-size:11px; padding:10px;">Gagal load QR</p>';
    }

    // ─── Countdown Timer ──────────────────────────────────────────────────────
    function mulaiCountdown() {
        if (countdownInterval) clearInterval(countdownInterval);
        updateCountdownDisplay();
        countdownInterval = setInterval(updateCountdownDisplay, 1000);
    }

    function updateCountdownDisplay() {
        if (!expiredAt) return;
        const ms = expiredAt - Date.now();
        if (ms <= 0) {
            clearInterval(countdownInterval);
            document.getElementById('countdownDisplay').innerText = 'EXPIRED';
            return;
        }
        const m = Math.floor(ms / 60000);
        const s = Math.floor((ms % 60000) / 1000);
        document.getElementById('countdownDisplay').innerText =
            `Berlaku ${m}:${String(s).padStart(2, '0')} lagi`;
    }

    // ─── Cashify: Polling Check Status ────────────────────────────────────────
    function mulaiPolling() {
        if (pollingInterval) clearInterval(pollingInterval);
        pollingInterval = setInterval(async () => {
            try {
                const res = await fetch('/api/check-status', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ transactionId: cashifyTransactionId })
                });
                const json = await res.json();
                const status = json.data?.status?.toLowerCase();
                if (status === 'paid' || status === 'success') {
                    clearInterval(pollingInterval);
                    pollingInterval = null;
                    clearInterval(countdownInterval);
                    countdownInterval = null;
                    prosesLunas();
                }
            } catch (e) {
                console.log("Polling...");
            }
        }, 5000);
    }

    // ─── Proses setelah lunas ─────────────────────────────────────────────────
    async function prosesLunas() {
        const trxId = "TRX-" + Math.floor(100000 + Math.random() * 900000);
        await fetch(`${BASE_URL}stok_akun/${selectedProdId}/${selectedAkunId}.json`, { method: 'DELETE' });
        await fetch(`${BASE_URL}transaksi/${trxId}.json`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                produk: document.getElementById('payTitle').innerText,
                data: selectedDataAkun,
                nama: document.getElementById('buyerName').value,
                email: document.getElementById('buyerEmail').value,
                tanggal: new Date().toLocaleString('id-ID')
            })
        });
        document.getElementById('step-qris').style.display = 'none';
        document.getElementById('step-success').style.display = 'block';
        document.getElementById('finalData').innerText = selectedDataAkun;
        showToast("Pembayaran lunas! Ambil akunmu.", "success");
    }

    // ─── Modal Controls ───────────────────────────────────────────────────────
    function closeModal() {
        if (pollingInterval) { clearInterval(pollingInterval); pollingInterval = null; }
        if (countdownInterval) { clearInterval(countdownInterval); countdownInterval = null; }
        document.getElementById('paymentModal').style.display = 'none';
        document.getElementById('step-input').style.display = 'block';
        document.getElementById('step-qris').style.display = 'none';
        document.getElementById('step-success').style.display = 'none';
        const btn = document.getElementById('btnLanjutkan');
        btn.disabled = false;
        btn.innerHTML = 'Lanjutkan';
    }

    function closeInvoiceModal() { document.getElementById('invoiceModal').style.display = 'none'; }
    function openInvoiceModal() { document.getElementById('invoiceModal').style.display = 'block'; }

    async function cariInvoice() {
        const id = document.getElementById('inputTrxId').value.trim().toUpperCase();
        if (!id) return showToast("Masukkan ID Transaksi!");
        const r = document.getElementById('invoiceResult');
        r.innerHTML = '<p style="color:#8e959e;font-size:12px;margin-top:10px;">Mencari...</p>';
        try {
            const res = await fetch(`${BASE_URL}transaksi/${id}.json`);
            const d = await res.json();
            if (!d) return r.innerHTML = '<p style="color:red;font-size:12px;margin-top:10px;">ID tidak ditemukan.</p>';
            r.innerHTML = `
                <div style="margin-top:15px; text-align:left;">
                    <span style="font-size:11px; color:#8e959e;">PRODUK: ${d.produk}</span>
                    <div class="data-box" id="invoiceDataText">${d.data}</div>
                    <button class="btn-buy" style="background:var(--success-green); margin-top:10px; padding:10px;" onclick="copyData('invoiceDataText')">SALIN AKUN</button>
                </div>`;
        } catch (e) {
            r.innerHTML = '<p style="color:red;font-size:12px;margin-top:10px;">Error koneksi.</p>';
        }
    }

    function copyData(elementId) {
        const txt = document.getElementById(elementId).innerText;
        navigator.clipboard.writeText(txt)
            .then(() => showToast("Berhasil disalin!", "success"))
            .catch(() => showToast("Gagal menyalin, silakan manual."));
    }

    fetchProducts();
</script>
</body>
</html>
